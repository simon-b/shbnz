services:
  site:
    image: ruby:3.3
    command: bash -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --incremental"
    ports:
      - 4000:4000
    volumes:
      - .:/srv/jekyll
      - ./vendor/bundle:/usr/local/bundle
    working_dir: /srv/jekyll
    environment:
      - BUNDLE_PATH=/usr/local/bundle